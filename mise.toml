[tools]
uv = "latest"
kubectl = "latest"
kind = "latest"

[tasks.lint]
description = "Type check and lint"
run = [
    "uv run ty check exoclaw_temporal",
    "uv run ruff check exoclaw_temporal",
]

[tasks.format]
description = "Format code"
run = "uv run ruff format exoclaw_temporal"

[tasks.test]
description = "Run tests"
run = "uv run pytest tests/"

[tasks.cluster-up]
description = "Create kind cluster with 3 nodes"
run = "kind create cluster --config k8s/kind-config.yaml --name exoclaw-temporal"

[tasks.cluster-down]
description = "Destroy kind cluster"
run = "kind delete cluster --name exoclaw-temporal"

[tasks.temporal-up]
description = "Deploy Temporal (postgres + server + UI) into the kind cluster"
run = [
    "kubectl --context kind-exoclaw-temporal apply -f k8s/temporal/postgres.yaml",
    "kubectl --context kind-exoclaw-temporal rollout status statefulset/postgres -n temporal --timeout=120s",
    "kubectl --context kind-exoclaw-temporal apply -f k8s/temporal/server.yaml",
    "kubectl --context kind-exoclaw-temporal wait --for=condition=complete job/temporal-schema-setup -n temporal --timeout=120s",
    "kubectl --context kind-exoclaw-temporal rollout status deployment/temporal -n temporal --timeout=120s",
]

[tasks.worker-deploy]
description = "Build and deploy the worker to kind"
run = [
    "docker build -t exoclaw-temporal-worker:local .",
    "kind load docker-image exoclaw-temporal-worker:local --name exoclaw-temporal",
    "kubectl apply -f k8s/worker/",
]

[tasks.demo-turn]
description = "Run turn-based demo (local, no k8s)"
run = "uv run python -m exoclaw_temporal.turn_based"

[tasks.demo-session]
description = "Run session-based demo (local, no k8s)"
run = "uv run python -m exoclaw_temporal.session_based"

[tasks.bounce-demo]
description = "Kill a worker node mid-execution to demonstrate durability"
run = "bash scripts/bounce_demo.sh"
