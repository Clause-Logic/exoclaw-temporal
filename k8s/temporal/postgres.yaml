apiVersion: v1
kind: Namespace
metadata:
  name: temporal
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: temporal
data:
  init-temporal.sql: |
    CREATE USER temporal WITH PASSWORD 'temporal' CREATEDB;
    CREATE DATABASE temporal OWNER temporal;
    CREATE DATABASE temporal_visibility OWNER temporal;
    GRANT ALL PRIVILEGES ON DATABASE temporal TO temporal;
    GRANT ALL PRIVILEGES ON DATABASE temporal_visibility TO temporal;
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: temporal
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_PASSWORD
              value: postgres
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: init
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: temporal
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
