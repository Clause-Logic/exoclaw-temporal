apiVersion: v1
kind: ConfigMap
metadata:
  name: temporal-dynamicconfig
  namespace: temporal
data:
  development-sql.yaml: |
    frontend.enableClientVersionCheck:
      - value: true
        constraints: {}
    matching.numTaskqueueReadPartitions:
      - value: 1
        constraints: {}
    matching.numTaskqueueWritePartitions:
      - value: 1
        constraints: {}
    history.historyCountLimitWarn:
      - value: 10000
        constraints: {}
    history.historyCountLimitError:
      - value: 50000
        constraints: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: temporal-setup-script
  namespace: temporal
data:
  setup.sh: |
    #!/bin/sh
    set -e
    echo "Setting up schema..."
    temporal-sql-tool --plugin postgres12 --ep postgres -p 5432 -u temporal --pw temporal --db temporal create || true
    temporal-sql-tool --plugin postgres12 --ep postgres -p 5432 -u temporal --pw temporal --db temporal setup-schema -v 0.0
    temporal-sql-tool --plugin postgres12 --ep postgres -p 5432 -u temporal --pw temporal --db temporal update-schema -d /etc/temporal/schema/postgresql/v12/temporal/versioned
    temporal-sql-tool --plugin postgres12 --ep postgres -p 5432 -u temporal --pw temporal --db temporal_visibility create || true
    temporal-sql-tool --plugin postgres12 --ep postgres -p 5432 -u temporal --pw temporal --db temporal_visibility setup-schema -v 0.0
    temporal-sql-tool --plugin postgres12 --ep postgres -p 5432 -u temporal --pw temporal --db temporal_visibility update-schema -d /etc/temporal/schema/postgresql/v12/visibility/versioned
    echo "Schema setup complete!"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: temporal-schema-setup
  namespace: temporal
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: temporalio/admin-tools:latest
          command: ["/bin/sh", "/scripts/setup.sh"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: temporal-setup-script
            defaultMode: 0755
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: temporal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal
  template:
    metadata:
      labels:
        app: temporal
    spec:
      containers:
        - name: temporal
          image: temporalio/server:latest
          env:
            - name: DB
              value: postgres12
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: temporal
            - name: POSTGRES_PWD
              value: temporal
            - name: POSTGRES_SEEDS
              value: postgres
            - name: BIND_ON_IP
              value: "0.0.0.0"
            - name: DYNAMIC_CONFIG_FILE_PATH
              value: config/dynamicconfig/development-sql.yaml
          ports:
            - containerPort: 7233
          volumeMounts:
            - name: dynamicconfig
              mountPath: /etc/temporal/config/dynamicconfig
          readinessProbe:
            tcpSocket:
              port: 7233
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: dynamicconfig
          configMap:
            name: temporal-dynamicconfig
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-frontend
  namespace: temporal
spec:
  selector:
    app: temporal
  ports:
    - name: grpc
      port: 7233
      targetPort: 7233
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-ui
  namespace: temporal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-ui
  template:
    metadata:
      labels:
        app: temporal-ui
    spec:
      containers:
        - name: ui
          image: temporalio/ui:latest
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal-frontend:7233
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-web
  namespace: temporal
spec:
  type: NodePort
  selector:
    app: temporal-ui
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30233
